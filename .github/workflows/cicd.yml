name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: clone the code
        run: echo "Clonning the code"

  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build the code
        run: echo "Building using Docker"

  test:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Testing the code
        run: echo "Testing the app"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the code
        run: echo "Deploying the code"
